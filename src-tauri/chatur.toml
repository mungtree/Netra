pi_binary = "pi"
data_dir = ".chatur/data"
log_dir = ".chatur/logs"

[concurrency]
global_max = 1
per_project_max = 1

[agent]
tools = "read_bash"
system_prompt_append = "You can only use the read tool, you can only use bash tools ls, grep, cat, find for inspection. DO NOT do anything that may change files."

[timeout]
enabled = true
secs = 300

[chromadb]
enabled = true
host = "127.0.0.1"
port = 8765
data_dir = "/home/meet/.chatur/chroma-data"
auto_start = false
max_file_size_bytes = 1048576
extra_ignore_globs = [
    "*.git",
    ".git/",
    "docs/",
]
embedding_model = "jina-code"
