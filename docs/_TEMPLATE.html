<!DOCTYPE html>
<!--
  COPY-ME SKELETON for a new code-wiki page.

  1. Copy this file to its destination under docs/.
  2. Set data-root  = relative path from the new file to docs/  ("."  ".."  "../..")
     Set data-page  = the new file's href relative to docs/  (matches its nav.js entry)
  3. Add one entry for the page to docs/assets/nav.js.
  4. Fill in <title>, the breadcrumb, and #content.
  5. For a reference page, follow the 7-section template in docs/AGENTS.md.

  Do NOT hand-write the sidebar — nav.js injects it from the data-* attributes.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PAGE TITLE — NETRA Wiki</title>
  <link rel="stylesheet" href="REL/assets/style.css">
</head>
<body data-root="REL" data-page="PATH/FROM/docs/TO/THIS.html">
  <nav id="sidebar"></nav>
  <main id="content">

    <div class="crumb"><a href="REL/index.html">Home</a> / Section / Page</div>

    <h1>Page heading</h1>
    <p class="lead">One-sentence summary of the page.</p>

    <h2>Section</h2>
    <p>Body…</p>

  </main>
  <script src="REL/assets/nav.js"></script>
</body>
</html>
